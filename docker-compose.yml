version: '3.8'

services:
  designer-api:
    build:
      context: ./designer-api
    ports:
      - "3001:3001"
    volumes:
      - ./designer-api:/app
      - /app/node_modules
      - ./cmdb-repo:/cmdb-repo
    environment:
      - PORT=3001
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - cmdb-net

  designer:
    build:
      context: ./designer
    ports:
      - "5173:5173"
    volumes:
      - ./designer:/app
      - /app/node_modules
    depends_on:
      - designer-api
    networks:
      - cmdb-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=cmdb
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    networks:
      - cmdb-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  reconciler:
    build:
      context: ./reconciler
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./reconciler:/app
      - .:/repo
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cmdb
      - CMDB_REPO_PATH=/repo
    networks:
      - cmdb-net

  runtime-api:
    build:
      context: ./cmdb-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cmdb
    networks:
      - cmdb-net

  runtime-ui:
    build:
      context: ./cmdb-ui
    ports:
      - "3003:3003"
    networks:
      - cmdb-net

networks:
  cmdb-net:
    driver: bridge
